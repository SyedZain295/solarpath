# Paid Render deploy (web + Postgres) — use only when ready to pay ~$14/mo

services:
  - type: web
    name: solarpath
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: STRIPE_LIVE_ENABLED
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: BETA_ACCESS_PASSWORD
        generateValue: true
      - key: SUPPORT_EMAIL
        sync: false
      - key: BETA_INVITE_TOKENS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: solarpath-db
          property: connectionString

databases:
  - name: solarpath-db
    plan: starter
    databaseName: solarpath
    user: solarpath
