# Free event deploy — Render web (free) + Neon Postgres (free)
# Set DATABASE_URL from Neon in the Render dashboard after deploy.

services:
  - type: web
    name: solar-path
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: STRIPE_LIVE_ENABLED
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: BETA_ACCESS_PASSWORD
        sync: false
      - key: BETA_INVITE_TOKENS
        sync: false
      - key: REGION_FOCUS
        value: Bayern
