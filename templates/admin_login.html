{% extends "base.html" %}
{% block title %}{{ t('admin.login_title') }}{% endblock %}
{% block body_class %}app-page{% endblock %}
{% block content %}
<div class="register-page page-bg-wrap">
  <div class="page-bg" aria-hidden="true"></div>
  <div class="page-content">
    <div class="page-header-hero">
      <h1>{{ t('admin.login_title') }}</h1>
      <p>{{ t('admin.login_sub') }}</p>
    </div>
    <div class="glass-panel register-panel" style="max-width:420px;margin:0 auto">
      {% if error %}
      <p class="form-error-banner" role="alert">{{ t('admin.login_error') }}</p>
      {% endif %}
      <form method="post" action="/admin">
        <div class="form-group">
          <label for="admin_token">{{ t('admin.token_label') }}</label>
          <input type="password" id="admin_token" name="admin_token" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">{{ t('admin.login_btn') }}</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
