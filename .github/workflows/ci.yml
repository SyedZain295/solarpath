name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      APP_ENV: development
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate environment
        run: python scripts/validate_env.py --ci

      - name: Validate config module
        run: python -c "from config import get_settings; get_settings(); print('config ok')"

      - name: Syntax check
        run: python -m compileall -q .

      - name: Import smoke test
        run: python -c "import app; print('app import ok')"

      - name: UI smoke check
        run: python scripts/ui_smoke_check.py

      - name: Run tests with coverage
        run: pytest tests/ -q --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: pip-audit
        continue-on-error: true
        run: pip-audit -r requirements.txt --desc on

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5
      - run: docker build -t solar-website-ci .

  codespaces:
    name: Codespaces app smoke test
    runs-on: ubuntu-latest
    needs: validate
    env:
      SECRET_KEY: ci-codespaces-smoke-secret-key
      ADMIN_TOKEN: ci-codespaces-smoke-admin
      SOLARPATH_SQLITE: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Build and start (CI compose)
        run: docker compose -f docker-compose.ci.yml up --build -d --wait

      - name: Verify app files in container
        run: docker compose -f docker-compose.ci.yml exec -T web python -c "from pathlib import Path; assert Path('/app/database.py').is_file(), 'database.py missing in image'"

      - name: Wait for /health
        run: |
          set -euo pipefail
          for i in $(seq 1 24); do
            if curl -sf http://localhost:5000/health; then
              echo ""
              echo "App healthy"
              exit 0
            fi
            if ! docker compose -f docker-compose.ci.yml ps --status running | grep -q web; then
              echo "Container not running — dumping logs"
              docker compose -f docker-compose.ci.yml ps -a || true
              docker compose -f docker-compose.ci.yml logs --tail=120
              exit 1
            fi
            echo "Waiting... ($i/24)"
            sleep 5
          done
          docker compose -f docker-compose.ci.yml logs --tail=120
          exit 1

      - name: Smoke test calculator page
        run: curl -sf http://localhost:5000/calculator | head -c 200

      - name: UI smoke check (in container)
        run: docker compose -f docker-compose.ci.yml exec -T web python scripts/ui_smoke_check.py

      - name: Stop
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
